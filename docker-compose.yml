version: '3.8'

services:
  # Servicio de Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acme-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=acme_user
      - DB_PASSWORD=acme_password
      - DB_NAME=acme_erp
    depends_on:
      - mariadb
    networks:
      - acme-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Servicio de Base de Datos MariaDB
  mariadb:
    image: mariadb:latest
    container_name: acme-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=acme_root_2026
      - MYSQL_DATABASE=acme_erp
      - MYSQL_USER=acme_user
      - MYSQL_PASSWORD=acme_password
      - TZ=America/Mexico_City
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - acme-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  acme-net:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
